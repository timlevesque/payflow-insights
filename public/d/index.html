<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — PayFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <div class="bg-white border-b border-gray-200 px-4 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <a href="/" class="font-bold text-gray-800 text-sm">
        <span class="text-indigo-600">Pay</span>Flow
      </a>
      <span class="text-xs text-gray-400">Your private dashboard</span>
    </div>
  </div>

  <div class="max-w-5xl mx-auto p-4 pt-8" id="dashContent">
    <div class="text-center text-gray-400 py-20">Loading...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const key = params.get('k');

    async function loadDashboard() {
      if (!key) {
        document.getElementById('dashContent').innerHTML = '<p class="text-center text-red-400 py-20">No dashboard key provided.</p>';
        return;
      }
      try {
        const res = await fetch(`/api/dashboard/${key}`);
        if (!res.ok) throw new Error();
        const { simulation: sim, leads } = await res.json();
        render(sim, leads);
      } catch (e) {
        document.getElementById('dashContent').innerHTML = '<p class="text-center text-red-400 py-20">Dashboard not found. Check your link.</p>';
      }
    }

    function render(sim, leads) {
      document.title = `${sim.productName} — Dashboard`;

      const completed = leads.filter(l => l.stepReached === 'completed').length;
      const consented = leads.filter(l => l.consented).length;
      const visits = sim.visits || 0;
      const convRate = visits > 0 ? ((completed / visits) * 100).toFixed(1) : '—';
      const simUrl = `${window.location.origin}/s/?v=${sim.id}`;

      document.getElementById('dashContent').innerHTML = `
        <!-- Sim info + share link -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
          <div>
            <h1 class="text-2xl font-bold text-gray-800">${esc(sim.productName)}</h1>
            <p class="text-sm text-gray-500 mt-1">Created ${formatDate(sim.createdAt)}</p>
          </div>
          <div class="flex items-center gap-2">
            <input readonly value="${simUrl}" class="text-sm text-gray-600 border border-gray-200 rounded-lg px-3 py-2 bg-white w-64 focus:outline-none" onclick="this.select()">
            <button onclick="copyUrl('${simUrl}')" class="bg-indigo-600 text-white text-sm px-3 py-2 rounded-lg font-medium hover:bg-indigo-700 whitespace-nowrap">Copy link</button>
          </div>
        </div>

        <!-- Funnel stats -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
          ${stat('Visits', visits, 'Total page views')}
          ${stat('Checkouts', completed, 'Completed the form')}
          ${stat('Conv. rate', convRate + (convRate === '—' ? '' : '%'), 'Visits → checkout')}
          ${stat('Opted in', consented, 'Want to be contacted')}
        </div>

        <!-- Funnel bar -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-6">
          <h2 class="text-sm font-semibold text-gray-700 mb-4">Conversion funnel</h2>
          <div class="space-y-3">
            ${funnelBar('Visited', visits, visits)}
            ${funnelBar('Completed checkout', completed, visits)}
            ${funnelBar('Opted in to follow-up', consented, visits)}
          </div>
        </div>

        <!-- Leads table -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-gray-700">Leads (${completed})</h2>
            ${completed > 0 ? `<button onclick="exportCsv()" class="text-xs text-indigo-600 border border-indigo-200 rounded-lg px-3 py-1.5 hover:bg-indigo-50 font-medium">Export CSV</button>` : ''}
          </div>

          ${completed === 0 ? `
            <div class="text-center py-12 text-gray-400">
              <p class="text-4xl mb-3">📭</p>
              <p class="text-sm">No leads yet. Share your simulation link to start collecting intent data.</p>
              <button onclick="copyUrl('${simUrl}')" class="mt-4 bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg font-medium hover:bg-indigo-700">Copy simulation link</button>
            </div>
          ` : `
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left text-xs text-gray-400 border-b border-gray-100">
                    <th class="pb-3 font-medium">Name</th>
                    <th class="pb-3 font-medium">Email</th>
                    <th class="pb-3 font-medium">Qty</th>
                    <th class="pb-3 font-medium">Total</th>
                    <th class="pb-3 font-medium">Opted in</th>
                    <th class="pb-3 font-medium">Device</th>
                    <th class="pb-3 font-medium">Date</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                  ${leads.filter(l => l.stepReached === 'completed').map(l => `
                    <tr class="hover:bg-gray-50">
                      <td class="py-3 text-gray-800 font-medium">${esc(l.buyerName)}</td>
                      <td class="py-3 text-gray-600">${l.buyerEmail ? esc(l.buyerEmail) : '<span class="text-gray-300 italic">anonymous</span>'}</td>
                      <td class="py-3 text-gray-500">${l.quantity}</td>
                      <td class="py-3 text-gray-800 font-medium">$${parseFloat(l.totalPrice).toFixed(2)}</td>
                      <td class="py-3">${l.consented ? '<span class="text-green-600 font-medium">Yes</span>' : '<span class="text-gray-300">No</span>'}</td>
                      <td class="py-3 text-gray-400 capitalize">${l.deviceType || '—'}</td>
                      <td class="py-3 text-gray-400">${formatDate(l.createdAt)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `}
        </div>
      `;

      // Store for CSV export
      window._leads = leads.filter(l => l.stepReached === 'completed');
      window._simName = sim.productName;
    }

    function stat(label, value, sub) {
      return `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
          <p class="text-xs text-gray-400 mb-1">${label}</p>
          <p class="text-3xl font-bold text-gray-800">${value}</p>
          <p class="text-xs text-gray-400 mt-1">${sub}</p>
        </div>
      `;
    }

    function funnelBar(label, value, total) {
      const pct = total > 0 ? Math.round((value / total) * 100) : 0;
      return `
        <div>
          <div class="flex justify-between text-xs text-gray-500 mb-1">
            <span>${label}</span>
            <span>${value} <span class="text-gray-300">(${pct}%)</span></span>
          </div>
          <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-indigo-500 rounded-full transition-all" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }

    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    function exportCsv() {
      const rows = [['Name','Email','Quantity','Total Price','Opted In','Device','Date']];
      window._leads.forEach(l => {
        rows.push([
          l.buyerName, l.buyerEmail || 'anonymous', l.quantity,
          parseFloat(l.totalPrice).toFixed(2),
          l.consented ? 'Yes' : 'No',
          l.deviceType || '',
          new Date(l.createdAt).toISOString(),
        ]);
      });
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${window._simName || 'leads'}-leads.csv`;
      a.click();
    }

    loadDashboard();
  </script>
</body>
</html>
