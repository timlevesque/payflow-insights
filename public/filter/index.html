<body class="bg-indigo-600 min-h-screen items-center justify-center">
    <header class="bg-transparent py-4 text-white">
        <div class="container mx-auto flex justify-between items-center px-4">
            <!-- Logo -->
            <div class=" font-bold text-xl">
                <a href="/" class="hover:opacity-75"><strong>PayFlow</strong> <span class="font-light">Insights</span></a>
            </div>

            <!-- Navigation -->
            <nav class="flex items-center space-x-6">
                <a href="/filter" class="font-semibold hover:text-gray-300">Analytics</a>

                <!-- Templates Dropdown -->
                <div class="relative">
                    <button id="dropdownButton" class="hover:text-gray-300 focus:outline-none">Examples</button>
                    <div id="dropdownMenu" style="width: max-content; right: -10px;" class="absolute hidden bg-white text-black mt-2 py-2 rounded-lg shadow-lg">
                        <a href="https://doogle.payflowinsights.com/payment/?v=Sdn8NA8q&q=https://google.com/" class="block px-4 py-2 hover:bg-gray-100">One Time Payment</a>
                        <a href="https://doogle.payflowinsights.com/subscribe/?v=bHfIcW32&q=https://google.com" class="block px-4 py-2 hover:bg-gray-100">Subscription Checkout</a>
                        <a href="https://doogle.payflowinsights.com/account/?v=bHfIcW32&q=https://google.com" class="block px-4 py-2 hover:bg-gray-100">Account Creation</a>
                    </div>
                </div>
                 <a href="https://submitandvote.com/?j9tpk1t745ntq569" class="hover:text-gray-300 hidden lg:block">Feedback</a>
            </nav>
        </div>
    </header>
    <h2 class="px-8 text-5xl font-bold mb-6 text-gray-800 text-center mx-auto max-w-xl mt-20 text-white">See Who Tried to Buy Your Product</h2>
    <div class="p-3">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-xl mx-auto">
            <form id="queryForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="url">Enter Your Secret Key</label>
                    <input class="appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="url" type="text" placeholder="Enter Secret Key">
                </div>
                <div class="flex items-center justify-between">
                    <button id="queryButton" class="bg-indigo-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline ml-auto" type="button">
                        See Analytics
                    </button>
                </div>
            </form>
            <div id="resultContainer" class="mt-6">
                <div id="countResult" class="mb-4"></div>
                <div id="emailList" class="mt-4"></div>
            </div>
        </div>
        <div class="mx-auto w-full text-center py-5">
            <a href="" class="mx-auto text-bold font-bold text-center text-white underline hover:text-blue-200 p-6">Lost your secret key?</a>
        </div>
    </div>

    <script>
        document.getElementById('queryButton').addEventListener('click', function() {
            const urlInput = document.getElementById('url');
            const url = urlInput.value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const countResult = document.getElementById('countResult');
            const emailList = document.getElementById('emailList');

            // Clear previous results
/*             resultContainer.innerHTML = '';
            countResult.innerHTML = '';
            emailList.innerHTML = ''; */

            // Validate URL
            if (!url) {
                resultContainer.innerHTML = '<p class="text-red-500">Please enter a valid URL.</p>';
                return;
            }

            // Show loading message
           /*  resultContainer.innerHTML = '<p>Loading...</p>'; */

            fetch(`/query-emails?secret=${encodeURIComponent(url)}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log(data);
                    
                    /* resultContainer.innerHTML = ''; */ // Clear loading message
                    let people = (data.count != 1) ? 'people' : 'person';
                    // Display count
                    if (data.count != undefined) {
                        countResult.innerHTML = `<p class="font-bold">${data.count} ${people} tried to buy/sign up for your product.</p>`;
                        console.log(data.count);
                    } else {
                        countResult.innerHTML = '<p class="text-yellow-500">Sekret Key Invalid. Create a new flow and get one <a href="/app" class="text-indigo-600 hover:text-indigo-800 underline">here.</a></p>';
                    }

                    // Display emails
                    if (Array.isArray(data.emails) && data.emails.length > 0) {
                        emailList.innerHTML = '<h3 class="font-bold mb-2">Email Opt-ins:</h3>';
                        const ul = document.createElement('ul');
                        ul.className = 'list-disc pl-5';
                        data.emails.forEach(email => {
                            const li = document.createElement('li');
                            li.textContent = email;
                            li.className = 'mb-1';
                            ul.appendChild(li);
                        });
                        emailList.appendChild(ul);
                    } else {
                        emailList.innerHTML = '<p>No one has given their email address yet.</p>';
                    }
                })
                .catch(error => {
                    console.error('Error querying data:', error);
                    resultContainer.innerHTML = `<p class="text-red-500">Error fetching data: ${error.message}. Please try again.</p>`;
                });
        });

        const dropdownButton = document.getElementById('dropdownButton');
        const dropdownMenu = document.getElementById('dropdownMenu');

        dropdownButton.addEventListener('click', () => {
            dropdownMenu.classList.toggle('hidden');
        });

        // Optional: Close the dropdown if clicked outside
        document.addEventListener('click', (event) => {
            if (!dropdownButton.contains(event.target) && !dropdownMenu.contains(event.target)) {
                dropdownMenu.classList.add('hidden');
            }
        });
    </script>
