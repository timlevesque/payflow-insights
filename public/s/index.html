<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    :root { --primary: #4f46e5; }
    .cta-btn { background-color: var(--primary); }
    .cta-btn:hover { opacity: 0.9; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    input:focus { outline: none; box-shadow: none; }
    .input-focused { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,70,229,0.2); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Simulation banner -->
  <div class="w-full bg-amber-50 border-b border-amber-200 py-2 px-4 text-center">
    <span class="text-xs font-semibold text-amber-700 tracking-wide">SIMULATION</span>
    <span class="text-xs text-amber-600 ml-2">— No payment will be processed</span>
  </div>

  <!-- Page content -->
  <div class="max-w-5xl mx-auto p-4 pt-8" id="pageContent">
    <!-- Loaded dynamically -->
    <div class="text-center text-gray-400 py-20">Loading...</div>
  </div>

  <!-- Disclosure modal -->
  <div id="disclosureModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
      <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-800 text-center mb-2">Thanks for your interest!</h2>
      <p id="revealMsg" class="text-gray-500 text-sm text-center mb-6">This was a purchase simulation — no payment was taken.</p>

      <div class="bg-gray-50 rounded-xl p-4 mb-6">
        <label class="flex items-start gap-3 cursor-pointer">
          <input type="checkbox" id="consentCheckbox" class="mt-0.5 h-4 w-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
          <span class="text-sm text-gray-700">I'm interested — <span id="creatorContactLabel">the creator</span> can follow up with me about this product.</span>
        </label>
      </div>

      <button onclick="confirmDisclosure()" class="cta-btn w-full text-white py-3 rounded-xl font-semibold text-sm transition-opacity">
        Continue
      </button>

      <p class="text-xs text-gray-400 text-center mt-4">
        Your data is collected by the simulation creator.
        <a href="#" class="underline">Learn more</a>
      </p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const simId = params.get('v');
    let simData = null;
    let leadSubmitted = false;

    async function loadSim() {
      if (!simId) {
        document.getElementById('pageContent').innerHTML = '<p class="text-center text-red-500 py-20">No simulation ID provided.</p>';
        return;
      }

      // Record visit
      fetch('/api/visit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ simId }),
      });

      try {
        const res = await fetch(`/api/simulation/${simId}`);
        if (!res.ok) throw new Error('Not found');
        simData = await res.json();
        renderPage();
      } catch (e) {
        document.getElementById('pageContent').innerHTML = '<p class="text-center text-red-400 py-20">Simulation not found.</p>';
      }
    }

    function renderPage() {
      document.title = simData.productName || 'Simulation';
      if (simData.primaryColor) {
        document.documentElement.style.setProperty('--primary', simData.primaryColor);
      }

      const isSub = simData.paymentType === 'subscription';
      const isService = simData.paymentType === 'service';
      const price = parseFloat(simData.price) || 0;

      document.getElementById('pageContent').innerHTML = `
        <!-- Header -->
        <div class="text-center mb-8">
          ${simData.logoUrl ? `<div class="h-12 mx-auto mb-4"><img src="${simData.logoUrl}" class="h-full w-auto mx-auto object-contain"></div>` : ''}
          <h1 class="text-xl font-bold text-gray-800 mb-1">${esc(simData.productName)}</h1>
          ${simData.tagline ? `<p class="text-sm text-gray-500">${esc(simData.tagline)}</p>` : ''}
        </div>

        <!-- Checkout card -->
        <div class="flex flex-col lg:flex-row gap-4 bg-white rounded-xl shadow-sm p-6 lg:p-8">

          <!-- Left: form -->
          <div class="lg:w-3/5 lg:pr-8 lg:border-r border-gray-100">
            <h2 class="text-base font-semibold text-gray-700 mb-5">${isService ? 'Contact details' : 'Payment details'}</h2>

            <form id="checkoutForm" onsubmit="handleSubmit(event)" class="space-y-3">
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Full name</label>
                <div class="border border-gray-200 rounded-lg px-3 py-2.5 transition-colors" id="nameWrap">
                  <input type="text" id="buyerName" placeholder="Jane Doe" required
                    class="w-full bg-transparent border-none p-0 text-sm focus:outline-none"
                    onfocus="focusWrap('nameWrap')" onblur="blurWrap('nameWrap')">
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Email</label>
                <div class="border border-gray-200 rounded-lg px-3 py-2.5 transition-colors" id="emailWrap">
                  <input type="email" id="buyerEmail" placeholder="jane@example.com" required
                    class="w-full bg-transparent border-none p-0 text-sm focus:outline-none"
                    onfocus="focusWrap('emailWrap')" onblur="blurWrap('emailWrap')">
                </div>
              </div>
              ${!isService ? `
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Card details</label>
                <div class="border border-gray-200 rounded-lg px-3 py-2.5 bg-white flex items-center justify-between" id="cardWrap">
                  <input id="cardNum" type="text" placeholder="4242 4242 4242 4242" maxlength="19"
                    class="w-full bg-transparent border-none p-0 text-sm focus:outline-none text-gray-700"
                    oninput="fmtCard(this)" onfocus="focusWrap('cardWrap')" onblur="blurWrap('cardWrap')" required>
                  <div class="flex gap-2 ml-2 flex-shrink-0">
                    <input id="cardExp" type="text" placeholder="MM/YY" maxlength="5"
                      class="w-12 bg-transparent border-none p-0 text-xs text-gray-400 focus:outline-none text-right"
                      oninput="fmtExp(this)" onfocus="focusWrap('cardWrap')" onblur="blurWrap('cardWrap')" required>
                    <input id="cardCvc" type="text" placeholder="CVC" maxlength="4"
                      class="w-8 bg-transparent border-none p-0 text-xs text-gray-400 focus:outline-none text-right"
                      oninput="this.value=this.value.replace(/\D/g,'').slice(0,4)"
                      onfocus="focusWrap('cardWrap')" onblur="blurWrap('cardWrap')" required>
                  </div>
                </div>
              </div>
              ` : ''}

              <button type="submit" id="ctaBtn" class="cta-btn w-full text-white py-3 px-4 rounded-lg font-semibold text-sm mt-2 transition-opacity opacity-50 cursor-not-allowed" disabled>
                ${esc(simData.ctaText || 'Pay Now')}
              </button>
            </form>

            <p class="text-xs text-gray-400 text-center mt-3">
              Powered by <span class="font-medium text-indigo-400">PayFlow</span> · Simulation only
            </p>
          </div>

          <!-- Right: order summary -->
          <div class="lg:w-2/5">
            <h2 class="text-base font-semibold text-gray-700 mb-5">Order summary</h2>

            ${simData.productImageUrl ? `
            <div class="w-full h-40 mb-4 rounded-xl overflow-hidden">
              <img src="${simData.productImageUrl}" class="w-full h-full object-cover">
            </div>` : ''}

            <div class="space-y-2 text-sm">
              <div class="flex justify-between">
                <span class="text-gray-600">${esc(simData.productName)}</span>
                <span class="font-medium text-gray-800">$${price % 1 === 0 ? price : price.toFixed(2)}${isSub ? '/mo' : ''}</span>
              </div>
              ${!isSub ? `
              <div class="flex justify-between text-gray-400 items-center">
                <span>Qty</span>
                <div class="flex items-center gap-2">
                  <button onclick="changeQty(-1)" class="w-6 h-6 border border-gray-200 rounded text-gray-500 hover:bg-gray-50 text-sm leading-none">−</button>
                  <span id="qtyDisplay">1</span>
                  <button onclick="changeQty(1)" class="w-6 h-6 border border-gray-200 rounded text-gray-500 hover:bg-gray-50 text-sm leading-none">+</button>
                </div>
              </div>` : `<div class="text-xs text-gray-400">Billed monthly</div>`}
            </div>

            <div class="border-t border-gray-100 mt-4 pt-4">
              <div class="flex justify-between font-semibold text-gray-800">
                <span>Total</span>
                <span id="totalDisplay">$${price.toFixed(2)}</span>
              </div>
            </div>
          </div>
        </div>
      `;

      setupFormValidation();
    }

    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function focusWrap(id) { document.getElementById(id)?.classList.add('input-focused'); }
    function blurWrap(id) { document.getElementById(id)?.classList.remove('input-focused'); }

    function fmtCard(input) {
      let v = input.value.replace(/\D/g,'').slice(0,16);
      input.value = v.replace(/(\d{4})(?=\d)/g,'$1 ');
    }
    function fmtExp(input) {
      let v = input.value.replace(/\D/g,'').slice(0,4);
      if (v.length > 2) v = v.slice(0,2)+'/'+v.slice(2);
      input.value = v;
    }

    let qty = 1;
    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      document.getElementById('qtyDisplay').textContent = qty;
      const price = parseFloat(simData.price) || 0;
      document.getElementById('totalDisplay').textContent = '$' + (price * qty).toFixed(2);
    }

    function setupFormValidation() {
      const form = document.getElementById('checkoutForm');
      const btn = document.getElementById('ctaBtn');
      if (!form || !btn) return;
      form.addEventListener('input', () => {
        const valid = form.checkValidity();
        btn.disabled = !valid;
        btn.classList.toggle('opacity-50', !valid);
        btn.classList.toggle('cursor-not-allowed', !valid);
      });
    }

    async function handleSubmit(e) {
      e.preventDefault();
      if (leadSubmitted) return;

      const price = parseFloat(simData.price) || 0;
      const total = simData.paymentType === 'subscription' ? price : price * qty;

      await fetch('/api/lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          simulationId: simId,
          buyerName: document.getElementById('buyerName').value,
          buyerEmail: document.getElementById('buyerEmail').value,
          quantity: qty,
          totalPrice: total,
          consented: false,
          stepReached: 'completed',
          deviceType: /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop',
        }),
      });
      leadSubmitted = true;

      document.getElementById('revealMsg').textContent = simData.revealMessage || 'This was a purchase simulation — no payment was taken.';
      document.getElementById('disclosureModal').classList.remove('hidden');
    }

    async function confirmDisclosure() {
      const consented = document.getElementById('consentCheckbox').checked;

      // Update lead consent if they opted in
      if (consented) {
        await fetch('/api/lead/consent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ simulationId: simId, buyerEmail: document.getElementById('buyerEmail').value, consented: true }),
        }).catch(() => {});
      }

      document.getElementById('disclosureModal').classList.add('hidden');
      document.getElementById('pageContent').innerHTML = `
        <div class="max-w-md mx-auto text-center py-20">
          <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <h2 class="text-2xl font-bold text-gray-800 mb-3">You're on the list</h2>
          <p class="text-gray-500 text-sm">${esc(simData.revealMessage)}</p>
        </div>
      `;
    }

    loadSim();
  </script>
</body>
</html>
