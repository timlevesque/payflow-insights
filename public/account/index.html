    <script>
        // Initialize Mixpanel
        mixpanel.init("bab4ae57464b185c5d9abc472f2a6983", {
            debug: true
        });

        // Track page view event
        document.addEventListener("DOMContentLoaded", () => {
            mixpanel.track("Page Viewed", {
                url: window.location.href,
                title: document.title,
                referrer: document.referrer
            });
        });

        // Track clicks on buttons and links
document.addEventListener("click", (event) => {
    const target = event.target;

    // Check if the clicked element is a button or a link
    if (target.tagName === "BUTTON" || target.tagName === "A") {
        mixpanel.track("Element Clicked", {
            tagName: target.tagName,
            id: target.id || null,
            classList: target.classList.value || null,
            innerText: target.innerText || null,
            href: target.tagName === "A" ? target.href || null : null // Only include href for links
        });
    }
});

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            box-shadow: none;
        }

        .input-wrapper-focused {
            border-color: #2563EB;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto max-w-xl p-4">
        <div class="text-center mb-8">
            <div class="h-12 mx-auto mb-4 overflow-hidden">
                <img id="companyLogo" src="" class="object-cover h-full w-auto mx-auto">
            </div>
            <h1 id="productName" class="text-lg font-bold text-gray-700 mb-4">Payflow Insights</h1>
            <div class="flex justify-center space-x-2 text-gray-400 text-xs">
                <div id="companyName" class="font-semibold text-gray-700 hidden">CREATE ACCOUNT</div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-10 mb-6">
            <h2 class="text-2xl font-semibold text-gray-700 my-6 text-center">Create Your Account</h2>
            <form id="accountCreationForm">
                <input type="hidden" id="hiddenCompanyName" name="companyName">
                <input type="hidden" id="hiddenProductName" name="productName">
                
                <label for="fullName" class="block text-sm font-medium text-gray-500 mb-1">Full name</label>
                <div id="full-name-wrapper" class="mb-4 p-2 border border-gray-300 rounded">
                    <input type="text" id="fullName" name="name" class="w-full bg-transparent border-none p-0 focus:outline-none focus:shadow-none" placeholder="Jane Diaz" required>
                </div>
            
                <label for="email" class="block text-sm font-medium text-gray-500 mb-1">Email</label>
                <div id="email-wrapper" class="mb-4 p-2 border border-gray-300 rounded">
                    <input type="email" id="email" name="email" class="w-full bg-transparent border-none p-0 focus:outline-none focus:shadow-none" placeholder="jane.diaz@example.com">
                </div>

                <label for="fakeOut" class="block text-sm font-medium text-gray-500 mb-1">Password</label>
                <div id="fakeOut-wrapper" class="mb-4 p-2 border border-gray-300 rounded">
                    <input type="fakeOut" id="fakeOut" class="w-full bg-transparent border-none p-0 focus:outline-none focus:shadow-none" placeholder="••••••••" required minlength="8" autocomplete="one-time-code">
                </div>

                <label for="confirmfakeOut" class="block text-sm font-medium text-gray-500 mb-1">Confirm Password</label>
                <div id="confirm-fakeOut-wrapper" class="mb-4 p-2 border border-gray-300 rounded">
                    <input type="fakeOut" id="confirmfakeOut" class="w-full bg-transparent border-none p-0 focus:outline-none focus:shadow-none" placeholder="••••••••" required minlength="8" autocomplete="one-time-code">
                </div>
                <p id="fakeOutError" class="text-red-500 text-sm mb-4 hidden">Passwords do not match.</p>

                <button id="createAccountButton" type="submit" class="mt-4 w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 font-semibold opacity-50 cursor-not-allowed" disabled="">
                    CREATE ACCOUNT
                </button>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmationModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 px-3 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md">
            <h2 id="modalHeader" class="text-xl font-semibold text-gray-700 mb-4">Oops! This is not ready yet</h2>
            <p id="modalBody" class="text-gray-600 mb-4">Thank you for your interest in our product! While this is not yet available we will let you know when it is ready.</p>
            
            <!-- Checkbox to update email in MongoDB -->
            <div class="flex items-center mb-4">
                 <input id="updateEmailCheckbox" type="checkbox" checked class="updateEmailCheckbox h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label class="ml-2 block text-sm text-gray-700">I agree to the <span id="termsPopup" class="text-blue-500 cursor-pointer">terms and conditions.</span></label>
            </div>
                

            

            <div class="flex justify-end space-x-4">
                <a href="/" id="modalConfirmButton" class=" flaot-right text-center modalConfirmButton bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Continue →</a>
            </div>
        </div>
    </div>

    <!-- Popup modal structure -->
    <div id="termsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[51]">
        <div class="bg-white rounded-lg shadow-lg w-11/12 md:w-1/2 lg:w-1/3 p-6 relative">
            <span class="absolute top-4 right-4 text-xl font-bold text-gray-600 cursor-pointer" id="closeIcon">&times;</span>
            <div id="termsText" class=" overflow-y-auto mb-4 text-gray-800"></div>
                 <!-- Checkbox to update email in MongoDB -->
                 <div class="flex items-center my-4">
                    <input id="updateEmailCheckbox" type="checkbox" checked class="updateEmailCheckbox h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                   <label for="updateEmailCheckbox" class="ml-2 block text-sm text-gray-700">I agree to these terms and conditions.</label>
               </div>
            <a href="/" id="modalConfirmButton" class=" float-right text-center modalConfirmButton bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Continue →</a>
        </div>
    </div>

    <script src="../js/terms.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const dataId = params.get('v');
            const urlParam = params.get('q');

            if (dataId) {
                fetch(`/fetch-event-data?dataId=${dataId}`)
                    .then(response => response.json())
                    .then(data => {
                        const companyLogo = document.getElementById('companyLogo');
                        const productName = document.getElementById('productName');
                        const companyName = document.getElementById('companyName');
                        const successMessage = document.getElementById('modalBody');
                        const continueUrl = document.getElementsByClassName('modalConfirmButton');

                        if (data.companyLogo) companyLogo.src = data.companyLogo;
                        if (data.companyName) {
                            companyName.textContent = data.companyName;
                            document.title = `Create Account - ${data.companyName}`;
                        }
                        if (data.productName) productName.textContent = data.productName;
                        if (data.successMessage) successMessage.textContent = data.successMessage;

                        if (urlParam) {
                            Array.from(continueUrl).forEach(button => {
                            button.href = urlParam;
                        });
                        }else if (data.destinationUrl) {
                            Array.from(continueUrl).forEach(button => {
                            button.href = urlParam;
                        });
                        }

                        document.getElementById('hiddenCompanyName').value = data.companyName || '';
                        document.getElementById('hiddenProductName').value = data.productName || '';
                    })
                    .catch(error => console.error('Error fetching event data:', error));
            }

            const createAccountButton = document.getElementById('createAccountButton');
            const confirmationModal = document.getElementById('confirmationModal');
            const modalSubmitButton = document.getElementsByClassName('modalConfirmButton');
            const modalCancelButton = document.getElementById('modalCancelButton');
            const fakeOutError = document.getElementById('fakeOutError');
            const updateEmailCheckbox = document.getElementsByClassName('updateEmailCheckbox');

            function checkFormValidity() {
                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                const fakeOut = document.getElementById('fakeOut').value;
                const confirmfakeOut = document.getElementById('confirmfakeOut').value;

                const allFieldsFilled = fullName && email && fakeOut && confirmfakeOut;
                const fakeOutsMatch = fakeOut === confirmfakeOut;
                const isValidfakeOut = fakeOut.length >= 8;

                if (fakeOut && confirmfakeOut) {
                    if (fakeOutsMatch) {
                        fakeOutError.classList.add('hidden');
                    } else {
                        fakeOutError.classList.remove('hidden');
                    }
                } else {
                    fakeOutError.classList.add('hidden');
                }

                const isFormValid = allFieldsFilled && fakeOutsMatch && isValidfakeOut;

                createAccountButton.disabled = !isFormValid;
                createAccountButton.classList.toggle('opacity-50', !isFormValid);
                createAccountButton.classList.toggle('cursor-not-allowed', !isFormValid);
            }

            ['fullName', 'email', 'fakeOut', 'confirmfakeOut'].forEach(fieldId => {
                document.getElementById(fieldId).addEventListener('input', checkFormValidity);
            });

            // Show the modal and submit the form data (excluding email) when fakeOut is clicked
            document.getElementById('fakeOut').addEventListener('input', function () {
                document.getElementById('fakeOut').blur();
                confirmationModal.classList.remove('hidden');
                
                const formData = new FormData(document.getElementById('accountCreationForm'));
                const params = new URLSearchParams(window.location.search);
                const dataId = params.get('v');
                const accountData = Object.fromEntries(formData);
                accountData.url = window.location.href;
               

                // Exclude the email field
                delete accountData.email;
    
                if (dataId) {
                    accountData.dataId = dataId;
                }

                console.log(accountData);
    
                fetch('/submit-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(accountData)
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Account data submitted:', data);
                })
                .catch(error => console.error('Error submitting account data:', error));
            },{once : true});

            const checkboxes = document.querySelectorAll('.updateEmailCheckbox');
            const checkbox1 = checkboxes[0];
            const checkbox2 = checkboxes[1];
            

            // Function to synchronize checkboxes
            function syncCheckboxes(source, target) {
                target.checked = source.checked;
            }

            // Event listeners to synchronize checkboxes
            checkbox1.addEventListener('change', () => {
                syncCheckboxes(checkbox1, checkbox2);
            });

            checkbox2.addEventListener('change', () => {
                syncCheckboxes(checkbox2, checkbox1);
            });

    // Get all elements with the class 'modalConfirmButton'
const modalConfirmButtons = document.querySelectorAll('.modalConfirmButton');

function handleConfirmButtonClick(event) {
    event.preventDefault(); // Prevent default behavior for both click and touch

    const formData = new FormData(document.getElementById('accountCreationForm'));
    const accountData = Object.fromEntries(formData);
    const updateEmailCheckbox = document.querySelector('.updateEmailCheckbox:checked');
    
    if (updateEmailCheckbox) {
        fetch('/update-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: accountData.email, dataId })
        })
        .then(response => response.json())
        .then(data => {
            console.log('Email updated:', data);
            // Hide the confirmation modal
            document.getElementById('confirmationModal').classList.add('hidden');
            // Navigate to the link
            window.location.href = this.getAttribute('href');
        })
        .catch(error => {
            console.error('Error updating email:', error);
            // Navigate even if there's an error
            window.location.href = this.getAttribute('href');
        });
    } else {
        // If no email update is needed, navigate immediately
        window.location.href = this.getAttribute('href');
    }
}

// Add click event listener to each button
modalConfirmButtons.forEach(button => {
    button.addEventListener('click', handleConfirmButtonClick);
    button.addEventListener('touchend', handleConfirmButtonClick);
});

// Add touch event listeners for mobile devices
modalConfirmButtons.forEach(button => {
    button.addEventListener('touchstart', function(e) {
        e.preventDefault(); // Prevent default touch behavior
    });
    button.addEventListener('touchend', function(e) {
        e.preventDefault(); // Prevent default touch behavior
    });
});
        });
    </script>
</body>
</html>
